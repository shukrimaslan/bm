<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BM Vocab - Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Nunito', sans-serif; }

    /* Option buttons */
    .option-btn {
      transition: transform .12s, box-shadow .12s, background .15s;
      border: 2.5px solid transparent;
    }
    .option-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
    .option-correct {
      background: #dcfce7 !important;
      border-color: #16a34a !important;
      color: #15803d !important;
    }
    .option-wrong {
      background: #fee2e2 !important;
      border-color: #dc2626 !important;
      color: #b91c1c !important;
    }

    /* Score bar */
    .score-bar {
      height: 8px; border-radius: 99px;
      background: #e0e7ff; overflow: hidden;
    }
    .score-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #4f46e5, #818cf8);
      transition: width .4s ease;
    }

    /* Mode tabs */
    .mode-tab { transition: background .2s, color .2s; }
    .mode-tab.active {
      background: #4f46e5;
      color: white;
    }

    /* Shake animation for wrong answer */
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }
    .shake { animation: shake .4s; }

    /* Bounce for correct */
    @keyframes bounce-in {
      0%{transform:scale(.95)}
      60%{transform:scale(1.04)}
      100%{transform:scale(1)}
    }
    .bounce-in { animation: bounce-in .3s; }

    /* Result card pop */
    @keyframes pop-in {
      0%{transform:scale(.7);opacity:0}
      80%{transform:scale(1.05)}
      100%{transform:scale(1);opacity:1}
    }
    .pop-in { animation: pop-in .5s forwards; }

    /* Feedback overlay */
    .feedback-correct { background: #dcfce7; border-left: 5px solid #16a34a; }
    .feedback-wrong   { background: #fee2e2; border-left: 5px solid #dc2626; }

    /* Type input */
    #typeInput:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px #c7d2fe; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm px-6 py-4 flex items-center justify-between">
    <a href="home.html" class="text-indigo-600 font-bold text-lg flex items-center gap-2">← Back</a>
    <h1 class="font-extrabold text-indigo-700 text-lg">🎯 Quiz</h1>
    <span class="text-sm text-gray-400" id="qCounter">1 / 10</span>
  </nav>

  <div class="max-w-md mx-auto px-4 py-6">

    <!-- Mode selector -->
    <div class="flex bg-white rounded-2xl p-1 shadow-sm mb-5 gap-1">
      <button class="mode-tab active flex-1 py-2 rounded-xl font-bold text-sm" id="tabMCQ" onclick="setMode('mcq')">
        📋 MCQ
      </button>
      <button class="mode-tab flex-1 py-2 rounded-xl font-bold text-sm text-gray-500" id="tabType" onclick="setMode('type')">
        ✏️ Type Answer
      </button>
      <button class="mode-tab flex-1 py-2 rounded-xl font-bold text-sm text-gray-500" id="tabSpeed" onclick="setMode('speed')">
        ⚡ Speed
      </button>
    </div>

    <!-- Score & progress -->
    <div class="flex items-center justify-between mb-2">
      <span class="text-indigo-600 font-bold text-sm">Score: <span id="scoreDisplay">0</span></span>
      <span class="text-sm text-gray-400">❤️ <span id="livesDisplay">3</span></span>
    </div>
    <div class="score-bar mb-5">
      <div class="score-fill" id="scoreFill" style="width:0%"></div>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="text-center py-20 text-gray-400">
      <div class="text-5xl mb-4">⏳</div>
      <p>Loading quiz...</p>
    </div>

    <!-- Quiz screen -->
    <div id="quizScreen" class="hidden">

      <!-- Question card -->
      <div class="bg-white rounded-3xl shadow-md p-6 mb-5 text-center" id="questionCard">
        <p class="text-indigo-400 text-xs font-bold uppercase tracking-widest mb-3" id="questionDir">
          What is the English meaning of...
        </p>
        <p class="text-4xl font-black text-gray-800" id="questionWord">—</p>
        <!-- Speed timer bar -->
        <div id="timerBarWrapper" class="hidden mt-4">
          <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
            <div id="timerBar" class="h-full bg-indigo-400 rounded-full transition-none" style="width:100%"></div>
          </div>
        </div>
      </div>

      <!-- Feedback strip -->
      <div id="feedbackStrip" class="hidden rounded-xl px-4 py-3 mb-4 text-sm font-bold"></div>

      <!-- MCQ Options -->
      <div id="mcqOptions" class="grid grid-cols-2 gap-3 mb-4">
        <!-- Filled by JS -->
      </div>

      <!-- Type Answer -->
      <div id="typeSection" class="hidden mb-4">
        <input type="text" id="typeInput" placeholder="Type your answer..."
          class="w-full border-2 border-indigo-200 rounded-2xl px-5 py-4 text-lg font-bold text-gray-700 mb-3"
          autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button onclick="submitTyped()"
          class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-2xl shadow text-lg">
          Submit ➜
        </button>
      </div>

      <!-- Next button (shown after answer) -->
      <button id="nextBtn" onclick="nextQuestion()"
        class="hidden w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-md text-lg">
        Next Question →
      </button>

    </div>

    <!-- Results screen -->
    <div id="resultsScreen" class="hidden text-center">
      <div class="pop-in bg-white rounded-3xl shadow-lg p-8">
        <div id="resultEmoji" class="text-6xl mb-3">🏆</div>
        <h2 class="text-2xl font-black mb-1" id="resultTitle">Quiz Complete!</h2>
        <p class="text-gray-400 mb-6" id="resultSubtitle"></p>

        <div class="grid grid-cols-3 gap-3 mb-8">
          <div class="bg-green-50 rounded-2xl p-3">
            <p class="text-2xl font-black text-green-600" id="resCorrect">0</p>
            <p class="text-xs text-gray-500">Correct</p>
          </div>
          <div class="bg-red-50 rounded-2xl p-3">
            <p class="text-2xl font-black text-red-400" id="resWrong">0</p>
            <p class="text-xs text-gray-500">Wrong</p>
          </div>
          <div class="bg-indigo-50 rounded-2xl p-3">
            <p class="text-2xl font-black text-indigo-500" id="resScore">0%</p>
            <p class="text-xs text-gray-500">Score</p>
          </div>
        </div>

        <!-- Missed words review -->
        <div id="missedSection" class="hidden text-left mb-6">
          <p class="font-bold text-gray-600 mb-2 text-sm">📖 Words to Review:</p>
          <div id="missedList" class="space-y-2"></div>
        </div>

        <div class="flex flex-col gap-3">
          <button onclick="restartQuiz()"
            class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-2xl shadow">
            🔁 Try Again
          </button>
          <a href="study.html" id="studyLink"
            class="block bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-2xl shadow text-center">
            📚 Back to Flashcards
          </a>
          <a href="home.html"
            class="block bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 rounded-2xl text-center">
            🏠 Home
          </a>
        </div>
      </div>
    </div>

  </div><!-- end max-w -->

  <script type="module">
    import { db, auth } from "./js/firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { collection, query, where, getDocs }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ---- State ----
    let allWords = [];
    let quizWords = [];
    let currentIndex = 0;
    let score = 0;
    let lives = 3;
    let correct = 0;
    let wrong = 0;
    let missedWords = [];
    let mode = "mcq";           // mcq | type | speed
    let answered = false;
    let speedTimer = null;
    const QUIZ_LENGTH = 10;
    const SPEED_SECONDS = 8;

    const params = new URLSearchParams(window.location.search);
    const packId = params.get("pack") || "";
    document.getElementById("studyLink").href = `study.html?pack=${packId}`;

    // Auth guard
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "index.html"; return; }
      await loadWords();
    });

    async function loadWords() {
      try {
        const q = query(collection(db, "words"), where("pack", "==", packId));
        const snap = await getDocs(q);
        allWords = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("quizScreen").classList.remove("hidden");
        startQuiz();
      } catch (err) {
        document.getElementById("loadingState").innerHTML =
          `<p class="text-red-400 text-center">Failed to load. Check Firestore rules.</p>`;
      }
    }

    function startQuiz() {
      quizWords = shuffle([...allWords]).slice(0, QUIZ_LENGTH);
      currentIndex = 0; score = 0; lives = 3;
      correct = 0; wrong = 0; missedWords = [];
      updateHUD();
      showQuestion();
    }

    function showQuestion() {
      if (currentIndex >= quizWords.length || lives <= 0) {
        showResults(); return;
      }
      answered = false;
      clearTimer();

      const word = quizWords[currentIndex];
      document.getElementById("feedbackStrip").classList.add("hidden");
      document.getElementById("nextBtn").classList.add("hidden");
      document.getElementById("qCounter").textContent =
        `${currentIndex + 1} / ${Math.min(QUIZ_LENGTH, quizWords.length)}`;

      // Randomise direction: BM→EN or EN→BM
      const bmToEn = Math.random() > 0.4; // bias toward BM→EN
      if (bmToEn) {
        document.getElementById("questionDir").textContent = "What is the English meaning of...";
        document.getElementById("questionWord").textContent = word.bm;
      } else {
        document.getElementById("questionDir").textContent = "What is the BM word for...";
        document.getElementById("questionWord").textContent = word.en;
      }
      word._bmToEn = bmToEn;

      if (mode === "mcq" || mode === "speed") {
        buildMCQ(word, bmToEn);
        document.getElementById("mcqOptions").classList.remove("hidden");
        document.getElementById("typeSection").classList.add("hidden");
        if (mode === "speed") startSpeedTimer();
      } else {
        document.getElementById("mcqOptions").classList.add("hidden");
        document.getElementById("typeSection").classList.remove("hidden");
        document.getElementById("typeInput").value = "";
        document.getElementById("typeInput").disabled = false;
        document.getElementById("typeInput").focus();
        // Allow Enter key
        document.getElementById("typeInput").onkeydown = (e) => {
          if (e.key === "Enter") submitTyped();
        };
      }
    }

    function buildMCQ(word, bmToEn) {
      const correctAnswer = bmToEn ? word.en : word.bm;
      const pool = allWords.filter(w => w.id !== word.id);
      const distractors = shuffle(pool)
        .slice(0, 3)
        .map(w => bmToEn ? w.en : w.bm);
      const options = shuffle([correctAnswer, ...distractors]);

      const container = document.getElementById("mcqOptions");
      container.innerHTML = "";
      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn bg-white border-gray-200 rounded-2xl p-4 font-bold text-gray-700 text-base shadow-sm";
        btn.textContent = opt;
        btn.onclick = () => handleMCQ(opt, correctAnswer, btn);
        container.appendChild(btn);
      });
    }

    window.handleMCQ = function(chosen, correct, btn) {
      if (answered) return;
      clearTimer();
      answered = true;
      const allBtns = document.querySelectorAll(".option-btn");
      allBtns.forEach(b => {
        b.disabled = true;
        if (b.textContent === correct) b.classList.add("option-correct");
      });

      if (chosen === correct) {
        btn.classList.add("option-correct", "bounce-in");
        showFeedback(true, correct);
        score += mode === "speed" ? 15 : 10;
        correct_count();
      } else {
        btn.classList.add("option-wrong", "shake");
        showFeedback(false, correct);
        lives--;
        wrong_count();
        missedWords.push(quizWords[currentIndex]);
      }
      updateHUD();
      document.getElementById("nextBtn").classList.remove("hidden");
    };

    window.submitTyped = function() {
      if (answered) return;
      const input = document.getElementById("typeInput");
      const typed = input.value.trim().toLowerCase();
      const word = quizWords[currentIndex];
      const correctAnswer = word._bmToEn ? word.en : word.bm;
      answered = true;
      input.disabled = true;

      if (fuzzyMatch(typed, correctAnswer.toLowerCase())) {
        showFeedback(true, correctAnswer);
        score += 10;
        correct_count();
        input.classList.add("border-green-400", "bg-green-50");
      } else {
        showFeedback(false, correctAnswer);
        lives--;
        wrong_count();
        missedWords.push(word);
        input.classList.add("border-red-400", "bg-red-50");
      }
      updateHUD();
      document.getElementById("nextBtn").classList.remove("hidden");
    };

    function showFeedback(isCorrect, correctAnswer) {
      const strip = document.getElementById("feedbackStrip");
      strip.className = `rounded-xl px-4 py-3 mb-4 text-sm font-bold ${isCorrect ? "feedback-correct" : "feedback-wrong"}`;
      strip.textContent = isCorrect
        ? `✅ Correct! "${correctAnswer}"`
        : `❌ Wrong! The answer is "${correctAnswer}"`;
      strip.classList.remove("hidden");
    }

    window.nextQuestion = function() {
      currentIndex++;
      showQuestion();
    };

    function showResults() {
      document.getElementById("quizScreen").classList.add("hidden");
      document.getElementById("resultsScreen").classList.remove("hidden");
      const total = correct + wrong;
      const pct = total ? Math.round((correct / total) * 100) : 0;

      document.getElementById("resCorrect").textContent = correct;
      document.getElementById("resWrong").textContent = wrong;
      document.getElementById("resScore").textContent = pct + "%";

      // Pick emoji & title based on score
      const [emoji, title, sub] =
        pct >= 90 ? ["🏆", "Excellent!", "You're a BM vocab champion!"] :
        pct >= 70 ? ["🎉", "Great job!", "Keep it up!"] :
        pct >= 50 ? ["👍", "Not bad!", "A bit more practice will help."] :
        ["💪", "Keep trying!", "Review the flashcards and try again."];

      document.getElementById("resultEmoji").textContent = emoji;
      document.getElementById("resultTitle").textContent = title;
      document.getElementById("resultSubtitle").textContent = sub;

      // Missed words list
      if (missedWords.length > 0) {
        document.getElementById("missedSection").classList.remove("hidden");
        const list = document.getElementById("missedList");
        list.innerHTML = missedWords.map(w =>
          `<div class="flex justify-between bg-red-50 rounded-xl px-4 py-2 text-sm">
            <span class="font-bold text-red-700">${w.bm}</span>
            <span class="text-gray-500">${w.en}</span>
          </div>`
        ).join("");
      }
    }

    window.restartQuiz = function() {
      document.getElementById("resultsScreen").classList.add("hidden");
      document.getElementById("quizScreen").classList.remove("hidden");
      startQuiz();
    };

    // ---- Mode switching ----
    window.setMode = function(m) {
      mode = m;
      ["mcq","type","speed"].forEach(id => {
        document.getElementById(`tab${id.charAt(0).toUpperCase()+id.slice(1) === "Mcq" ? "MCQ" : id.charAt(0).toUpperCase()+id.slice(1)}`)
          ?.classList.remove("active");
      });
      const map = { mcq:"tabMCQ", type:"tabType", speed:"tabSpeed" };
      document.getElementById(map[m]).classList.add("active");
      document.getElementById("timerBarWrapper").classList.toggle("hidden", m !== "speed");
      startQuiz();
    };

    // ---- Speed timer ----
    function startSpeedTimer() {
      const bar = document.getElementById("timerBar");
      document.getElementById("timerBarWrapper").classList.remove("hidden");
      bar.style.transition = "none";
      bar.style.width = "100%";
      let elapsed = 0;
      const interval = 100;
      speedTimer = setInterval(() => {
        elapsed += interval;
        const pct = Math.max(0, 100 - (elapsed / (SPEED_SECONDS * 1000)) * 100);
        bar.style.transition = `width ${interval}ms linear`;
        bar.style.width = pct + "%";
        bar.style.background = pct > 50 ? "#4f46e5" : pct > 25 ? "#f59e0b" : "#ef4444";
        if (elapsed >= SPEED_SECONDS * 1000) {
          clearTimer();
          if (!answered) {
            answered = true;
            const word = quizWords[currentIndex];
            const correctAnswer = word._bmToEn ? word.en : word.bm;
            showFeedback(false, correctAnswer);
            lives--;
            wrong_count();
            missedWords.push(word);
            updateHUD();
            document.querySelectorAll(".option-btn").forEach(b => b.disabled = true);
            document.getElementById("nextBtn").classList.remove("hidden");
          }
        }
      }, interval);
    }

    function clearTimer() {
      if (speedTimer) { clearInterval(speedTimer); speedTimer = null; }
    }

    // ---- Helpers ----
    function correct_count() { correct++; }
    function wrong_count()   { wrong++;   }

    function updateHUD() {
      document.getElementById("scoreDisplay").textContent = score;
      document.getElementById("livesDisplay").textContent = "❤️".repeat(Math.max(0, lives));
      const pct = quizWords.length ? (currentIndex / quizWords.length) * 100 : 0;
      document.getElementById("scoreFill").style.width = pct + "%";
    }

    function fuzzyMatch(input, target) {
      if (input === target) return true;
      // Allow 1 character difference for typos
      return levenshtein(input, target) <= 1;
    }

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      const dp = Array.from({length: m+1}, (_, i) =>
        Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0)
      );
      for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
          dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
            : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
      return dp[m][n];
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
  </script>

</body>
</html>
