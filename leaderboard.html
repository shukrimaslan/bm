<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>BM Vocab - Leaderboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Nunito', sans-serif; padding-bottom: 80px; }
    @keyframes fade-up { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fade-up .4s ease both; }
    .rank-1 { background: linear-gradient(135deg,#fef9c3,#fde68a); border-color:#fcd34d; }
    .rank-2 { background: linear-gradient(135deg,#f1f5f9,#e2e8f0); border-color:#cbd5e1; }
    .rank-3 { background: linear-gradient(135deg,#ffedd5,#fed7aa); border-color:#fdba74; }
    .rank-other { background: white; border-color: #f3f4f6; }
    .rank-me { border-color: #6366f1 !important; box-shadow: 0 0 0 3px #c7d2fe; }
    .avatar-sm { width:40px; height:40px; border-radius:99px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:16px; color:white; flex-shrink:0; }
    .bar-track { height:6px; background:#f3f4f6; border-radius:99px; overflow:hidden; flex:1; }
    .bar-fill  { height:100%; border-radius:99px; background:linear-gradient(90deg,#6366f1,#818cf8); }
    /* Bottom nav */
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #f3f4f6; padding:8px 0 max(8px,env(safe-area-inset-bottom)); z-index:50; }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; font-size:11px; font-weight:800; color:#9ca3af; text-decoration:none; transition:color .2s; }
    .nav-item.active { color:#6366f1; }
    .nav-icon { font-size:22px; line-height:1; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-lg mx-auto px-5 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🇲🇾</span>
        <h1 class="text-xl font-black text-indigo-700">BM Vocab</h1>
      </div>
      <h2 class="font-black text-gray-700">🏆 Ranking</h2>
      <div class="w-10"></div>
    </div>
  </nav>

  <div class="max-w-lg mx-auto px-5 py-6">

    <!-- Header card -->
    <div class="bg-gradient-to-br from-indigo-600 to-purple-600 rounded-3xl p-5 mb-5 text-white fade-up shadow-md">
      <p class="text-indigo-200 text-xs font-bold uppercase tracking-widest mb-1">All-Time XP Leaderboard</p>
      <h2 class="text-2xl font-black mb-1">Top Learners</h2>
      <p class="text-indigo-200 text-sm">Earn XP by studying and quizzing. Keep your streak going!</p>
    </div>

    <!-- Your rank card -->
    <div id="myRankCard" class="hidden bg-indigo-50 border-2 border-indigo-200 rounded-2xl px-5 py-4 mb-5 fade-up" style="animation-delay:.05s">
      <p class="text-indigo-400 text-xs font-bold uppercase mb-1">Your Rank</p>
      <div class="flex items-center gap-3">
        <span class="text-2xl font-black text-indigo-600" id="myRank">#—</span>
        <div class="flex-1">
          <p class="font-black text-gray-800" id="myName">—</p>
          <p class="text-xs text-indigo-500 font-semibold" id="myXPLabel">0 XP</p>
        </div>
        <span class="text-xs font-black bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full" id="myLevelLabel">—</span>
      </div>
    </div>

    <!-- Loading -->
    <div id="loadingState" class="space-y-3">
      <div class="bg-gray-200 rounded-2xl h-16 animate-pulse"></div>
      <div class="bg-gray-200 rounded-2xl h-16 animate-pulse"></div>
      <div class="bg-gray-200 rounded-2xl h-16 animate-pulse"></div>
    </div>

    <!-- Guest notice -->
    <div id="guestNotice" class="hidden text-center py-10">
      <div class="text-5xl mb-3">👤</div>
      <h3 class="font-black text-gray-600 mb-1">Sign in to appear on the leaderboard</h3>
      <a href="index.html" class="inline-block mt-3 bg-indigo-500 text-white font-bold py-2 px-5 rounded-full text-sm">Sign In</a>
    </div>

    <!-- Leaderboard list -->
    <div id="leaderList" class="hidden space-y-3"></div>

    <!-- Empty -->
    <div id="emptyState" class="hidden text-center py-10">
      <div class="text-5xl mb-3">📭</div>
      <p class="text-gray-400 font-semibold">No data yet. Start studying to appear here!</p>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="max-w-2xl mx-auto flex">
      <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
      <a href="progress.html" class="nav-item"><span class="nav-icon">📊</span>Progress</a>
      <a href="leaderboard.html" class="nav-item active"><span class="nav-icon">🏆</span>Ranking</a>
      <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span>Profile</a>
    </div>
  </nav>

  <script type="module">
    import { db, auth } from "./js/firebase.js";
    import { getLevel, LEVELS } from "./js/streak.js";
    import { onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { collection, getDocs, orderBy, query, limit }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const AVATAR_COLORS = ["#16a34a","#2563eb","#d97706","#db2777","#7c3aed","#ea580c","#0d9488","#dc2626"];
    const RANK_MEDALS = ["🥇","🥈","🥉"];

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "index.html"; return; }
      if (user.isAnonymous) {
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("guestNotice").classList.remove("hidden");
        return;
      }
      await loadLeaderboard(user);
    });

    async function loadLeaderboard(currentUser) {
      try {
        // Fetch all users — in production you'd limit this, but fine for school use
        const q = query(collection(db, "users"), orderBy("xp","desc"), limit(50));
        const snap = await getDocs(q);
        const users = snap.docs.map(d => ({ uid: d.id, ...d.data() }))
          .filter(u => (u.xp || 0) > 0);

        document.getElementById("loadingState").classList.add("hidden");

        if (users.length === 0) {
          document.getElementById("emptyState").classList.remove("hidden");
          return;
        }

        // Find current user's rank
        const myIdx = users.findIndex(u => u.uid === currentUser.uid);
        if (myIdx !== -1) {
          const me = users[myIdx];
          const myLevel = getLevel(me.xp || 0);
          document.getElementById("myRank").textContent = `#${myIdx+1}`;
          document.getElementById("myName").textContent = currentUser.displayName || currentUser.email || "You";
          document.getElementById("myXPLabel").textContent = `${me.xp || 0} XP`;
          document.getElementById("myLevelLabel").textContent = myLevel.title;
          document.getElementById("myRankCard").classList.remove("hidden");
        }

        // Render list
        const maxXP = users[0]?.xp || 1;
        const list = document.getElementById("leaderList");
        list.classList.remove("hidden");
        list.innerHTML = "";

        users.forEach((user, i) => {
          const isMe = user.uid === currentUser.uid;
          const rankClass = i===0?"rank-1":i===1?"rank-2":i===2?"rank-3":"rank-other";
          const medal = i < 3 ? RANK_MEDALS[i] : `<span class="text-gray-400 font-black">${i+1}</span>`;
          const level = getLevel(user.xp || 0);
          const xpPct = Math.round(((user.xp||0)/maxXP)*100);
          const color = AVATAR_COLORS[i % AVATAR_COLORS.length];
          const displayName = user.displayName || `User ${i+1}`;
          const initial = displayName.charAt(0).toUpperCase();
          const delay = (i * 0.04).toFixed(2);

          list.innerHTML += `
            <div class="border-2 ${rankClass} ${isMe?"rank-me":""} rounded-2xl px-4 py-3 flex items-center gap-3 fade-up" style="animation-delay:${delay}s">
              <div class="w-8 text-center text-xl">${medal}</div>
              <div class="avatar-sm" style="background:${color}">${initial}</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <p class="font-black text-gray-800 text-sm truncate">${displayName}${isMe?" (You)":""}</p>
                  ${i===0?'<span class="text-xs bg-yellow-200 text-yellow-700 font-black px-2 rounded-full">👑 Top</span>':""}
                </div>
                <div class="flex items-center gap-2 mt-1">
                  <div class="bar-track">
                    <div class="bar-fill" style="width:${xpPct}%"></div>
                  </div>
                  <span class="text-xs text-gray-500 font-bold whitespace-nowrap">${user.xp||0} XP</span>
                </div>
                <p class="text-xs text-gray-400 font-semibold mt-0.5">${level.title} · 🔥 ${user.streak||0}</p>
              </div>
            </div>`;
        });

      } catch (err) {
        document.getElementById("loadingState").innerHTML =
          `<p class="text-red-400 text-center text-sm py-4">Failed to load. Check Firestore rules & indexes.</p>
           <p class="text-gray-400 text-center text-xs">You may need to create a Firestore index on <code>users</code> ordered by <code>xp desc</code>.</p>`;
      }
    }
  </script>
</body>
</html>
